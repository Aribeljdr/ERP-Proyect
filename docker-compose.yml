version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-erp-db
    environment:
      POSTGRES_DB: orbit_erp
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orbit-erp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orbiterp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
